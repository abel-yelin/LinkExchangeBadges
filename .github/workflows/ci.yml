name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build core package (with type declarations)
        run: |
          echo "Building @link-exchange/core first..."
          cd packages/core && pnpm build
          echo "Core package built successfully"
          ls -la dist/

      - name: Build remaining packages
        run: |
          echo "Building remaining packages..."
          pnpm -r --filter @link-exchange/react --filter @link-exchange/script run build
          echo "All packages built successfully"

      - name: Type check - Core
        run: cd packages/core && pnpm exec tsc --noEmit

      - name: Type check - React
        run: cd packages/react && pnpm exec tsc --noEmit

      - name: Type check - Script
        run: cd packages/script && pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm -r run lint

      - name: Test
        run: pnpm -r run test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/core/dist
            packages/react/dist
            packages/script/dist
