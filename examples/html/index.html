<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Exchange SDK - HTML Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }
    footer {
      margin-top: 50px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h1>Link Exchange SDK - HTML Example</h1>
  <p>This page demonstrates the Link Exchange SDK using the CDN script tag.</p>

  <!-- Footer container for badges -->
  <footer id="link-exchange-footer"></footer>

  <!-- CDN script (placeholder - replace with actual CDN URL after build) -->
  <!-- <script src="https://cdn.example.com/link-exchange.umd.cjs"></script> -->

  <!-- For development, use local build -->
  <script src="../../packages/script/dist/link-exchange.umd.cjs"></script>

  <script>
    // === 配置选项 ===
    // 使用本地测试服务器（需先运行: node examples/server.mjs）
    const USE_LOCAL_SERVER = true;

    const CONFIG = {
      // 本地测试服务器 URL
      localUrl: 'http://localhost:8080/test-badges.json',
      // 远程 CDN URL（生产环境）
      remoteUrl: 'https://cdn.example.com/badges.json',

      siteId: 'html-example',
      environment: 'development',
      locale: 'en',

      cache: {
        enabled: true,
        ttlMs: 5 * 1000 // 5 秒（开发环境短缓存）
      },

      security: {
        allowedLinkDomains: ['github.com', 'npmjs.com', 'typescriptlang.org', 'opensource.org'],
        allowedImageDomains: ['img.shields.io', 'github.com', 'npmjs.com']
      },

      telemetry: {
        enabled: true,
        onEvent: (event) => console.log('[LinkExchange Telemetry]', event.type, event)
      },

      fetchTimeoutMs: 5000
    };

    // === 挂载徽章 ===
    window.LinkExchange.mount('#link-exchange-footer', {
      source: USE_LOCAL_SERVER ? CONFIG.localUrl : CONFIG.remoteUrl,
      siteId: CONFIG.siteId,
      environment: CONFIG.environment,
      locale: CONFIG.locale,
      cache: CONFIG.cache,
      security: CONFIG.security,
      telemetry: CONFIG.telemetry,
      fetchTimeoutMs: CONFIG.fetchTimeoutMs
    });

    // === 状态提示 ===
    console.log('%c🚀 Link Exchange SDK 已加载', 'color: #4CAF50; font-weight: bold');
    console.log('配置源:', USE_LOCAL_SERVER ? CONFIG.localUrl : CONFIG.remoteUrl);
    if (USE_LOCAL_SERVER) {
      console.log('%c💡 提示: 请确保本地测试服务器正在运行 (node examples/server.mjs)', 'color: #FF9800');
    }
  </script>
</body>
</html>
